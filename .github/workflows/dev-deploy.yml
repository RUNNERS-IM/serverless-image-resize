name: Deploy Image Resize Dev Lambda@Edge

on:
  push:
    branches:
      - develop

env:
  AWS_REGION: us-east-1

jobs:
  deploy:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        project:
          - name: pudding
            bucket: pudding-dev
            lambda: cf-dev-pudding-im
            distribution: E3BHGGV6V1UVA0
          - name: sense
            bucket: sense-server-dev
            lambda: cf-dev-sense-im
            distribution: EPOKMYRNE8523
          - name: senselab
            bucket: lab-sense-dev
            lambda: cf-dev-lab-sense-im
            distribution: E35M47GTMD3094

    name: Deploy ${{ matrix.project.name }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"

      - name: Set Bucket Name
        env:
          BUCKET_NAME: ${{ matrix.project.bucket }}
        run: node .github/actions/set-bucket-name.js

      - name: Install dependencies
        run: npm install

      - name: Test Lambda function
        run: npm run test

      - name: Build Lambda function
        run: npm run build

      - name: Package Lambda function
        run: cd dist && zip -r function.zip .

      - name: Deploy Lambda Function
        id: deploy_lambda
        run: |
          LAMBDA_VERSION=$(aws lambda update-function-code \
            --function-name ${{ matrix.project.lambda }} \
            --zip-file fileb://dist/function.zip \
            --publish \
            --query 'Version' \
            --output text)

          echo "LAMBDA_VERSION=$LAMBDA_VERSION" >> $GITHUB_OUTPUT

          echo "Waiting for Lambda function to become active..."
          aws lambda wait function-active-v2 --function-name ${{ matrix.project.lambda }}:$LAMBDA_VERSION

          echo "Lambda function is now active"

      - name: Update Cloudfront for Deploying Lambda@Edge
        env:
          LAMBDA_FUNCTION_NAME: ${{ matrix.project.lambda }}
          LAMBDA_FUNCTION_VERSION: ${{ steps.deploy_lambda.outputs.LAMBDA_VERSION }}
          CLOUDFRONT_DISTRIBUTION_ID: ${{ matrix.project.distribution }}
        run: node .github/actions/update-cloudfront.js
