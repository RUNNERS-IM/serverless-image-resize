name: Deploy Image Resize Prod Lambda@Edge

on:
  push:
    branches:
      - main

env:
  AWS_REGION: us-east-1

jobs:
  deploy:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        project:
          - name: pudding
            bucket: pudding-prod
            lambda: cf-pudding-im
            distribution: E2O7HSFFHUFJ6S
          - name: sense
            bucket: sense-server-prod
            lambda: cf-sense-im
            distribution: E2OYIKTKZ5M0X8
          - name: senselab
            bucket: lab-sense-prod
            lambda: cf-lab-sense-im
            distribution: E1J8P6VSCQR4BG
          - name: runners
            bucket: server.runners.prod
            lambda: cf-runners-im
            distribution: E1PCXW4JPCNOUQ

    name: Deploy ${{ matrix.project.name }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"

      - name: Set Bucket Name
        env:
          BUCKET_NAME: ${{ matrix.project.bucket }}
        run: node .github/actions/set-bucket-name.js

      - name: Install dependencies
        run: npm install

      - name: Test Lambda function
        run: npm run test

      - name: Build Lambda function
        run: npm run build

      - name: Package Lambda function
        run: cd dist && zip -r function.zip .

      - name: Deploy Lambda Function
        id: deploy_lambda
        run: |
          LAMBDA_VERSION=$(aws lambda update-function-code \
            --function-name ${{ matrix.project.lambda }} \
            --zip-file fileb://dist/function.zip \
            --publish \
            --query 'Version' \
            --output text)

          echo "LAMBDA_VERSION=$LAMBDA_VERSION" >> $GITHUB_OUTPUT

          echo "Waiting for Lambda function to become active..."
          aws lambda wait function-active-v2 --function-name ${{ matrix.project.lambda }}:$LAMBDA_VERSION

          echo "Lambda function is now active"

      - name: Update Cloudfront for Deploying Lambda@Edge
        env:
          LAMBDA_FUNCTION_NAME: ${{ matrix.project.lambda }}
          LAMBDA_FUNCTION_VERSION: ${{ steps.deploy_lambda.outputs.LAMBDA_VERSION }}
          CLOUDFRONT_DISTRIBUTION_ID: ${{ matrix.project.distribution }}
        run: node .github/actions/update-cloudfront.js
